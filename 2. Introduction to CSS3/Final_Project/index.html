<body>

	<header>
		<a href="#main" class = "skip_link">Skip to Main Content</a>
		<nav>
			<ul>
				<li><a href="index.html">Trollin'</a></li>
				<li><a href="message.html">Message</a></li>

			</ul>
		</nav>
		
		<h1>
			<img src = "assets/images/war_cat.png" alt = "Funny Cat Meme" id = "cat">
			Let's play a game!
			<img src = "assets/images/terrified_dog.jpg" alt = "Funny Dog Meme" id = "dog">
		</h1>
	</header>
	
	<main id = "main">
		<section id = "prank_zone">
			<h2>Click the button</h2>
			<button id="prank_button">Click me!</button>
		</section>
	</main>
	
	<script>
		//This JS code is generated by ChatGPT
		let count = 0;

		const zone = document.getElementById("prank_zone");
		const heading = zone.querySelector("h2");

		zone.addEventListener("click", function() {
		  count++;

		  // Bigger movement range (almost full screen)
		  const maxX = window.innerWidth - zone.offsetWidth;
		  const maxY = window.innerHeight - zone.offsetHeight;

		  const x = Math.random() * maxX;
		  const y = Math.random() * maxY;

		  zone.style.left = x + "px";
		  zone.style.top = y + "px";
		  zone.style.transform = "translate(0, 0)";

		  // Text progression (more steps now)
		  if (count === 2) heading.textContent = "Again";
		  if (count === 4) heading.textContent = "AGAIN!";
		  if (count === 6) heading.textContent = "A G A I N ! ! !";
		  if (count === 7) heading.textContent = "Last one. Trust.";

		  // Redirect after 8 clicks
		  if (count === 8) {
			window.location.href = "message.html";
		  }
		});
	</script>
</body>
